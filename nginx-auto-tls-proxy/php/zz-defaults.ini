; nginx-auto-tls-proxy baked PHP defaults.
; Do not edit in place — overrides go in a higher-priority drop-in (zz-user.ini)
; placed under /etc/nginx-auto-tls-proxy/php/conf.d/.

; --- Hardening / production posture ---
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Defense-in-depth: prevent PHP from creatively re-interpreting paths.
cgi.fix_pathinfo = 0

; --- Sessions ---
; cookie_secure is safe to enable unconditionally because PHP is only ever
; executed over HTTPS in this image (port 80 only carries ACME + 302s).
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On

; --- opcache ---
; Zend OPcache is statically built into the php85 binary on Alpine, so no
; zend_extension= line is needed here.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.jit = Off
