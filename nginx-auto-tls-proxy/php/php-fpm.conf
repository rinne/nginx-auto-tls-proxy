; nginx-auto-tls-proxy baked FPM master config.
; The pool config (www.conf) is rendered at startup from PHP_FPM_PROFILE.
; Do not edit in place — override pool settings via a drop-in under
; /etc/nginx-auto-tls-proxy/php/php-fpm.d/.

[global]
pid = /run/php-fpm.pid
error_log = /dev/stderr
daemonize = no

include = /etc/nginx-auto-tls-proxy/php/php-fpm.d/*.conf
