name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test (plain image)
        run: tests/smoke.sh
      - name: Smoke test (-php image)
        run: tests/smoke-php.sh
